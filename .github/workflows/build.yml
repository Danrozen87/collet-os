name: Collet OS Build

on:
  schedule:
    - cron: "05 10 * * *" # Daily at 10:05 UTC
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
  workflow_dispatch: # Manual trigger

jobs:
  bluebuild:
    name: Build Collet OS
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        recipe:
          - collet-os.yml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and push
        uses: blue-build/github-action@v1
        with:
          recipe: ${{ matrix.recipe }}
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
