# Collet OS — BlueBuild Recipe
# EU-sovereign, AI-integrated Linux desktop
# Built on COSMIC Desktop (Rust-native compositor)
# https://blue-build.org/reference/recipe/

name: collet-os
description: Collet OS — AI-powered sovereign desktop
base-image: ghcr.io/blue-build/base-images/fedora-cosmic
image-version: latest

modules:
  # ── System packages ──────────────────────────────────────
  - type: rpm-ostree
    install:
      # Container & virtualization
      - distrobox
      - podman-compose

      # System tools
      - htop
      - fastfetch
      - wl-clipboard
      - jq

      # Remote access (server/dev deployments)
      - openssh-server
      - xrdp
      - xorgxrdp

      # AI runtime dependencies
      - curl
      - git

    # Remove packages only if they exist in the COSMIC base image
    # COSMIC is a minimal image — most GNOME bloat is already absent
    remove: []

  # ── Default Flatpak applications ─────────────────────────
  # COSMIC ships: Files, Terminal, Edit, Settings, Store, Calculator
  # We add only what COSMIC doesn't include
  - type: default-flatpaks
    configurations:
      - scope: system
        notify: true
        install:
          # Browser
          - org.chromium.Chromium
          # Office
          - org.libreoffice.LibreOffice
          # Communication
          - org.signal.Signal
          # Email
          - org.mozilla.Thunderbird
          # Media
          - org.gnome.Showtime
          # Image viewer (if COSMIC doesn't ship one)
          - org.gnome.Loupe

  # ── Copy system configuration files ──────────────────────
  - type: files
    files:
      - source: usr
        destination: /usr
      - source: etc
        destination: /etc

  # ── Run configuration scripts ────────────────────────────
  - type: script
    scripts:
      - 01-branding.sh
      - 02-ai-layer.sh
      - 03-cosmic-defaults.sh

  # ── Systemd service configuration ────────────────────────
  - type: systemd
    system:
      enabled:
        - podman.socket
        - fwupd-refresh.timer
        - sshd.service
        - xrdp.service
      disabled:
        - NetworkManager-wait-online.service

  # ── Image signing ────────────────────────────────────────
  - type: signing
