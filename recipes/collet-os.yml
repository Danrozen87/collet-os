# Collet OS — BlueBuild Recipe
# EU-sovereign, AI-integrated Linux desktop
# https://blue-build.org/reference/recipe/

name: collet-os
description: Collet OS — AI-powered sovereign desktop
base-image: ghcr.io/ublue-os/silverblue-main
image-version: gts

modules:
  # ── System packages ──────────────────────────────────────
  - type: rpm-ostree
    install:
      # Container & virtualization
      - distrobox
      - podman-compose

      # Desktop polish
      - gnome-tweaks
      - gnome-shell-extension-appindicator
      - gnome-shell-extension-dash-to-panel
      - wl-clipboard

      # System tools
      - htop
      - fastfetch

      # Remote access (for server/dev deployments)
      - openssh-server
      - xrdp
      - xorgxrdp

      # AI runtime dependencies
      - curl
      - git

    remove:
      # Remove Firefox RPM — we ship Flatpak Chromium instead
      - firefox
      - firefox-langpacks
      # Remove Fedora branding
      - f42-backgrounds-base
      - f42-backgrounds-gnome
      - desktop-backgrounds-gnome
      - fedora-logos
      - fedora-logos-httpd
      # Remove bloat — AI replaces help, enterprise doesn't need app store
      - gnome-software
      - gnome-tour
      - yelp
      - yelp-libs
      - yelp-xsl
      - rygel
      - totem-pl-parser

  # ── Default Flatpak applications ─────────────────────────
  - type: default-flatpaks
    configurations:
      - scope: system
        notify: true
        install:
          # Browser — Chromium (open source, full Chrome compat, no Google sync)
          - org.chromium.Chromium
          # Office
          - org.libreoffice.LibreOffice
          # Communication
          - org.signal.Signal
          # Utilities
          - org.gnome.Calculator
          - org.gnome.Calendar
          - org.gnome.TextEditor
          - org.gnome.Loupe
          - org.gnome.clocks
          # Media
          - org.gnome.Showtime

  # ── Copy system configuration files ──────────────────────
  - type: files
    files:
      - source: usr
        destination: /usr
      - source: etc
        destination: /etc

  # ── Run configuration scripts ────────────────────────────
  - type: script
    scripts:
      - 01-branding.sh
      - 02-ai-layer.sh
      - 03-gnome-defaults.sh

  # ── Systemd service configuration ────────────────────────
  - type: systemd
    system:
      enabled:
        - podman.socket
        - fwupd-refresh.timer
        - rpm-ostreed-automatic.timer
        - sshd.service
        - xrdp.service
      disabled:
        - NetworkManager-wait-online.service

  # ── Image signing ────────────────────────────────────────
  - type: signing
