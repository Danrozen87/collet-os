# Collet OS — BlueBuild Recipe
# EU-sovereign, AI-integrated Linux desktop
# https://blue-build.org/reference/recipe/

name: collet-os
description: Collet OS — AI-powered sovereign desktop
base-image: ghcr.io/ublue-os/silverblue-main
image-version: gts

modules:
  # ── System packages ──────────────────────────────────────
  - type: rpm-ostree
    install:
      # Container & virtualization
      - distrobox
      - podman-compose

      # Desktop polish
      - gnome-tweaks
      - gnome-shell-extension-appindicator
      - gnome-shell-extension-dash-to-panel
      - wl-clipboard

      # System tools
      - htop
      - fastfetch

      # AI runtime dependencies
      - curl
      - git

    remove:
      # Remove Firefox RPM — we ship Flatpak Firefox instead
      - firefox
      - firefox-langpacks

  # ── Default Flatpak applications ─────────────────────────
  - type: default-flatpaks
    configurations:
      - scope: system
        notify: true
        install:
          # Browser
          - org.mozilla.firefox
          # Office
          - org.libreoffice.LibreOffice
          # Communication
          - org.signal.Signal
          # Utilities
          - org.gnome.Calculator
          - org.gnome.Calendar
          - org.gnome.TextEditor
          - org.gnome.Loupe
          - org.gnome.clocks
          - com.mattjakeman.ExtensionManager
          # Media
          - org.gnome.Showtime
          - io.bassi.Amberol

  # ── Copy system configuration files ──────────────────────
  - type: files
    files:
      - source: files
        destination: /

  # ── Run configuration scripts ────────────────────────────
  - type: script
    scripts:
      - 01-branding.sh
      - 02-ai-layer.sh
      - 03-gnome-defaults.sh

  # ── Systemd service configuration ────────────────────────
  - type: systemd
    system:
      enabled:
        - podman.socket
        - fwupd-refresh.timer
        - rpm-ostreed-automatic.timer
      disabled:
        - NetworkManager-wait-online.service

  # ── Image signing ────────────────────────────────────────
  - type: signing
